name: test

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  test:
    name: Test (Bash ${{ matrix.bash }})
    runs-on: ubuntu-latest
    timeout-minutes: 3

    strategy:
      fail-fast: false
      matrix:
        bash: [ "3.2", "4", "5" ]

    container: bash:${{ matrix.bash }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install dependencies
        run: apk add --no-cache bc curl make

      - name: Tests
        run: |
          make test
